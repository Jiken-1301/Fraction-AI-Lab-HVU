name: Next.js CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # Tự động cache node_modules dựa trên package-lock.json

      - name: Cài đặt dependencies
        run: npm ci # Dùng 'ci' thay vì 'install' để đảm bảo tính nhất quán trên môi trường CI

      # Bước quan trọng: Next.js sẽ build để kiểm tra lỗi code/TypeScript
      - name: Build dự án
        run: npm run build
        env:
          # Nếu bạn có các biến môi trường (.env), hãy thêm ở đây
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Thông báo kết quả
        if: success()
        run: echo "Next.js build thành công!"